name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: |
          python -m py_compile server.py
          python -m py_compile chatbot.py
          python -m py_compile tools.py
          python -m py_compile mock_services.py
          python -m py_compile document_loader.py
          python -m py_compile rag_engine.py
          python -m py_compile main.py

      - name: Validate JSON configs
        run: |
          python -c "import json; json.load(open('api_config.json')); print('api_config.json OK')"
          python -c "import json; json.load(open('mock_data.json')); print('mock_data.json OK')"

      - name: Run tests
        env:
          GROQ_API_KEY: gsk_test_dummy_key
        run: python -m pytest tests/ -v
